name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.235.254.91
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd NukkadMartBackend
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart nukkadmart-backend
            echo "✅ Backend deployed successfully!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.235.254.91
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            sudo systemctl status nukkadmart-backend --no-pager | head -20
